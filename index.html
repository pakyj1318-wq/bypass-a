<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bypass Intent</title>
</head>
<body>
    <h2 style="text-align:center;">실행할 항목을 선택하세요</h2>
    <div style="display:flex; flex-direction:column; gap:20px; padding:20px;">
        <a href="intent:#Intent;action=android.settings.SETTINGS;end" style="background:#eee; padding:20px; text-decoration:none; border-radius:10px; font-weight:bold; text-align:center;">⚙️ 전체 설정 열기</a>
        <a href="intent:#Intent;action=android.app.action.SET_NEW_PASSWORD;end" style="background:#eee; padding:20px; text-decoration:none; border-radius:10px; font-weight:bold; text-align:center;">🔑 비밀번호 설정 열기</a>
    </div>
    <p style="text-align:center; color:gray; font-size:12px;">Galaxy Note 4 / Note Pro 12.2 Optimized</p>
</body>
</html>
<!-- 1. 가장 강력한 방법: SmartLock(새 패턴 등록) 직접 진입 -->
<p><a href="intent:#Intent;action=com.google.android.gms.trustagent.TRUSTED_PLACES_SETTINGS;end" style="font-size:20px;">[🔐 SmartLock 패턴 설정(강추)]</a></p>

<!-- 2. 구글 플레이 서비스 설정 (데이터 삭제 및 강제 중지용) -->
<p><a href="intent:#Intent;action=com.google.android.gms.settings.google_play_services;end" style="font-size:20px;">[⚙️ 구글 플레이 서비스 설정]</a></p>

<!-- 3. 기기 관리자 앱 설정 (우회 앱에 권한 주거나 내 기기 찾기 끌 때) -->
<p><a href="intent:#Intent;action=android.settings.ACTION_MANAGE_DEFAULT_APPS_SETTINGS;end" style="font-size:20px;">[🛠️ 기본 앱/관리자 설정]</a></p>

<!-- 4. 갤럭시 전용: 삼성 계정 로그인 화면 (삼성 계정으로 백업/복원 우회 시) -->
<p><a href="intent:#Intent;action=com.os.samsung.action.SAMSUNG_ACCOUNT_LOGIN;end" style="font-size:20px;">[👤 삼성 계정 로그인]</a></p>

<!-- 5. 모든 앱 목록 (구글 플레이 서비스, 설정 등을 강제 중지할 때) -->
<p><a href="intent:#Intent;action=android.settings.APPLICATION_SETTINGS;end" style="font-size:20px;">[📱 전체 앱 목록 열기]</a></p>

<!-- 6. 화면 분할 모드 (일부 우회 앱 실행 시 필요) -->
<p><a href="intent:#Intent;action=android.settings.MANAGE_ALL_APPLICATIONS_SETTINGS;end" style="font-size:20px;">[📁 전체 앱 관리]</a></p>
